services:
  backend:
    build: ./backend
    container_name: network-playground-backend
    ports:
      - "8000:8000"
    cap_add:
      - NET_ADMIN
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: network-playground-redis
    ports:
      - "6379:6379"

  frontend:
    build: ./frontend
    container_name: network-playground-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend